<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Intégrer du contenu externe avec &lt;iframe&gt;></title>
</head>
<body>
    <h1>Intégrer du contenu externe avec &lt;iframe&gt;</h1>
    <table>
        <tr>
            <td><h2>L'université Ibn Tofail</h2>
                <p>Se situe à Kenitra et créée en 1989. </p>
                <p>Le site web de l'Université Ibn Tofail :</p>
                <iframe width="600" height="680"
                    src="https://www.uit.ac.ma" frameborder="0">
                </iframe>
            </td>
            <td>
                <h2>Le site web de l'ENSAK</h2>
                <iframe width="600" height="680"
                    src="https://ensa.uit.ac.ma" frameborder="0">
                </iframe>
            </td>
        </tr>
    </table>
</body>
</html>
