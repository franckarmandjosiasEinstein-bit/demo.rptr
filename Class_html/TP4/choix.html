<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Author" content="BONKOUNGOU Wendbenedo Franck Armand Josias">
    <title>Input -Checbox -radio</title>
</head>

<body>
    <form action="#" method="get">
        <!-- Boutons radio : un seul choix possible (meme name) -->
        <p><strong>Sexe :</strong></p>
        <p>
            <input type="radio" name="sexe" value="M" id="masculin">
            <label for="masculin">Masculin</label>
            <input type="radio" name="sexe" value="F" id="feminin" checked>
            <label for="feminin">Féminin</label>
        </p>

        <!-- Cases a cocher : plusieurs choix possibles -->
        <p><strong>Langages maîtrisés :</strong></p>
        <p>
            <input type="checkbox" name="lang" value="html" id="ch1" checked disabled> <label for="ch1">HTML</label>
            <input type="checkbox" name="lang" value="css" id="ch2"> <label for="ch2">CSS</label>
            <input type="checkbox" name="lang" value="js" id="ch3"> <label for="ch3">JavaScript</label>
            <input type="checkbox" name="lang" value="php" id="ch4"> <label for="ch4">PHP</label>
        </p>
        <p><input type="submit" value="Valider"></p>
    </form>
</body>

</html>
