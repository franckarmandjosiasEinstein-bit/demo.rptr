<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fusion de lignes avec rowspan</title>
</head>
<body>
    <h1>Fusion de lignes avec rowspan</h1>
    <table border="3">
        <thead>
            <tr>
                <caption><h2>Annual Income</h2></caption>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>Months</th>
                <th> Quantity sold </th>
                <th>Income (DH)</th>
            </tr>
            <tr>
                <th rowspan="7">First Semester</th>
            </tr>
            <tr>
                <td>1,500</td>
                <td>50,000</td>
            </tr>
            <tr>
                <td>1,200</td>
                <td>48,000</td>
            </tr>
            <tr>
                <td>1,800</td>
                <td>64,000</td>
            </tr>
            <tr>
                <td>1,600</td>
                <td>56,000</td>
            </tr>
            <tr>
                <td>1,400</td>
                <td>52,000</td>
            </tr>
            <tr>
                <td>1,900</td>
                <td>67,000</td>
            </tr>
            <tr>
                <th rowspan="7">Second Semester</th>
            </tr>
            <tr>
                <td>1,700</td>
                <td>61,000</td>
            </tr>
            <tr>
                <td>1,300</td>
                <td>49,000</td>
            </tr>
            <tr>
                <td>1,100</td>
                <td>45,000</td>
            </tr>
            <tr>
                <td>1,000</td>
                <td>40,000</td>
            </tr>
            <tr>
                <td>900</td>
                <td>36,000</td>
            </tr>
            <tr>
                <td>800</td>
                <td>32,000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th>Total Income</th>
                <th>16,200</th>
                <th>600,000</th>
            </tr>
        </tfoot>
</body>
</html>
