<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Author" content="Wendbenedo Franck Armand Josias BONKOUNGOU">
    <title>Fusion de colonnes avec colspan</title>
</head>
<body>
    <h1>Fusion de colonnes avec colspan</h1>
    <table border="1">
        <thead>
            <tr>
                <th colspan="3">Annual Income</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>Semesters</th>
                <th> Quantity sold </th>
                <th>Income (DH)</th>
            </tr>
            <tr>
                <td>First Semester</td>
                <td>1,500</td>
                <td>320,000</td>
            </tr>
            <tr>
                <td>Second Semester</td>
                <td>1,200</td>
                <td>280,000</td>
            </tr>
            </tbody>
            <tfoot>
            <tr>
                <th colspan="2">Total Income</th>
                <th>600,000</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
