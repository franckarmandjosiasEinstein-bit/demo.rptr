<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Author" content="Wendbenedo Franck Armand Josias BONKOUNGOU">
    <title>Dessiner avec SVG : la balise &lt;polygon&gt;</title>
</head>
<body>
    <h1>Dessiner avec SVG : la balise &lt;polygon&gt;</h1>
       <!-- Drapeau Burkina Faso -->
    <svg width="300" height="200" viewBox="0 0 900 600">
        <rect width="900" height="600" fill="#EF4135"/>
        <rect y="300" width="900" height="300" fill="#009739"/>
        <!-- Étoile jaune -->
        <polygon points="450,225 470,285 534,285 482,323 502,383 450,346 398,383 418,323 366,285 430,285" fill="#FCD116"/>
    </svg>

    <!-- Drapeau Maroc -->
    <svg width="300" height="200" viewBox="0 0 900 600">
        <rect width="900" height="600" fill="#C1272D"/>
        <!-- Étoile (Pentagramme) -->
        <polygon points="450,150 475,230 560,230 490,280 515,360 450,310 385,360 410,280 340,230 425,230" 
                 fill="none" stroke="#006233" stroke-width="20" stroke-linejoin="round"/>
    </svg>
</body>
</html>
