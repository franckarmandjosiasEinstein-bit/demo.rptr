<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Styles Internes</title>
    <style type="text/css">
        body { background-color: #FFFFCC; font-family: Verdana, sans-serif; }
        h1 { color: #1F3864; text-align: center; }
        p { color: #336699; font-size: 14px; line-height: 1.6em; }
        a { color: #990000; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Titre Principal</h1>
    <p>Ceci est un paragraphe avec du texte. <a href="#">Lien exemple</a></p>
    <p>Un autre paragraphe pour tester les styles.</p>
</body>
</html>
